# NachoMarket - Configuracion general
mode: live  # paper | live

# Auth Polymarket
# signature_type=1 → EOA (private key directo, sin proxy)
# signature_type=2 → Browser wallet / Magic Link (proxy address en POLYMARKET_PROXY_ADDRESS)
# La gran mayoría de cuentas creadas vía Polymarket.com usan proxy → 2
signature_type: 2

# Capital y riesgo
capital_total: 166           # USDC total disponible
max_risk_per_market: 0.05    # 5% maximo por mercado
max_daily_drawdown: 8.3      # 5% de $166 — parar si se pierden $8.3 en un dia
kelly_fraction: 0.25         # Quarter Kelly (conservador)
min_market_volume: 30000     # Tip 1: volumen minimo 40K; override para mercados chicos con alta participacion

# Self-review con Claude Haiku
review_interval_hours: 8
review_model: claude-haiku-4-5-20251001

# Estrategias activas
strategies_enabled:
  - market_maker
  - rewards_farmer
  # multi_arb, stat_arb, directional desactivados: con $150 los tickets son
  # demasiado chicos para que el arb compense fees. Concentrar en MM + rewards.
  # - event_driven   # Activar cuando se configure FRED API key
  # - directional    # Requiere mas capital

# Near-resolution gate: MM cancela quotes si el mercado resuelve en < N horas
near_resolution_hours: 336   # Tip 2: 14 dias (336h) minimo para operar

# Market Making
market_maker:
  spread_offset: 0.015          # 2 centavos de offset al mid (tip 3: agresivo desde 2c)
  order_size: 10.0             # ~$6 por lado (escalado a $166 de capital)
  refresh_seconds: 45          # Tip 21: paciencia — no reposicionar si mid no cambio >=2c
  max_inventory_per_market: 30 # 15% cap (tip 15: bot <= 15% de $166 = $24.9)
  repositioning_enabled: true  # Despues de un fill, reposicionar en entry+1c
  reposition_offset: 0.01      # 1 centavo de offset para reposicionamiento (tip 6)
  reposition_timeout_min: 60   # Cancelar reposicion si no se ejecuta en 90min
  near_resolution_hours: 300   # Tip 2: cancelar quotes si faltan < 14 dias para resolucion

# Arbitraje Multi-Outcome (desactivado)
multi_arb:
  min_edge: 0.03
  max_position: 12  # 7.3% de $166

# Stat-Arb YES/NO Cointegrado (desactivado)
stat_arb:
  edge_threshold: 0.02
  max_position: 12  # 7.3% de $166
  max_markets_simultaneous: 5
  fee_bps: 100

# LP Rewards Farming
rewards_farmer:
  max_capital_per_market: 24.9   # Tip 15: 15% de $166 = $24.9
  min_rewards_rate: 0.001        # 0.1% diario minimo
  max_markets_simultaneous: 5    # Tip 7: hasta 6 mercados con $166
  spread_offset: 0.015           # Tight para maximizar rewards

# Event-Driven Momentum (desactivado)
event_driven:
  max_position: 8.3
  momentum_delay_sec: 120
  pre_event_window_sec: 7200

# Directional Strategy (desactivado)
directional:
  min_edge_bps: 100
  min_size_usdc: 5.0
  max_size_usdc: 8.3         # 5% de $166 — regla INQUEBRANTABLE
  kelly_fraction: 0.25       # Quarter-Kelly
  expected_hold_seconds: 7200

# Blacklist por round-trip win rate
blacklist:
  min_trades: 10
  wr_threshold: 0.30
  blacklist_days: 7

# Stage Machine
stages:
  promote_threshold: 7
  review_window: 10

# Anti-frontrunning jitter
anti_frontrun:
  enabled: true
  size_jitter_pct: 0.15
  price_jitter_prob: 0.30
  timing_jitter_sec: 5.0

# Loop principal
main_loop_interval_sec: 10
health_check_interval_sec: 60

# Logging
log_level: INFO
log_file: data/nachomarket.log

# Telegram
telegram_enabled: true
telegram_alert_on_trade: true
telegram_alert_on_error: true
