# NachoMarket - Configuracion general
mode: paper  # paper | live

# Capital y riesgo
capital_total: 400           # USDC total disponible
max_risk_per_market: 0.05    # 5% maximo por mercado
max_daily_drawdown: 20       # $20 maximo de perdida diaria
kelly_fraction: 0.25         # Quarter Kelly (conservador)
min_market_volume: 1000      # Bajado: mercados chicos con rewards son mas rentables

# Self-review con Claude Haiku
review_interval_hours: 8
review_model: claude-haiku-4-5-20251001

# Estrategias activas
strategies_enabled:
  - market_maker
  - multi_arb
  - stat_arb
  - rewards_farmer
  # - event_driven   # Activar cuando se configure FRED API key

# Near-resolution gate (Fase 1): MM cancela quotes si el mercado resuelve en < N horas
near_resolution_hours: 6

# Market Making
market_maker:
  spread_offset: 0.02          # 2 centavos de offset al mid
  order_size: 15               # $15 por lado (mas diversificacion en mercados chicos)
  refresh_seconds: 45          # Refrescar ordenes cada 45s
  max_inventory_per_market: 30 # Maximo $30 de inventario por mercado (tighter)
  repositioning_enabled: true  # Despues de un fill, reposicionar en entry+1c
  reposition_offset: 0.01      # 1 centavo de offset para reposicionamiento
  reposition_timeout_min: 90   # Cancelar reposicion si no se ejecuta en 90min
  near_resolution_hours: 6     # Cancelar quotes si faltan < 6h para resolución

# Arbitraje Multi-Outcome
multi_arb:
  min_edge: 0.03    # 3% minimo para actuar
  max_position: 30  # Maximo $30 por posicion de arb

# Stat-Arb YES/NO Cointegrado (TODO 4.1)
stat_arb:
  edge_threshold: 0.02    # 2 centavos minimo (- fees)
  max_position: 30        # $30 max por arb
  max_markets_simultaneous: 5
  fee_bps: 100            # 1% taker

# LP Rewards Farming (TODO 4.2)
rewards_farmer:
  max_capital_per_market: 50.0
  min_rewards_rate: 0.001   # 0.1% diario minimo
  max_markets_simultaneous: 3
  spread_offset: 0.015

# Event-Driven Momentum (TODO 4.3)
event_driven:
  max_position: 20.0
  momentum_delay_sec: 120
  pre_event_window_sec: 7200

# Directional Strategy (Fase 3)
directional:
  min_edge_bps: 100          # Edge mínimo en bps (1%) para operar
  min_size_usdc: 5.0         # Tamaño mínimo de orden
  max_size_usdc: 20.0        # 5% de $400 — regla INQUEBRANTABLE
  kelly_fraction: 0.25       # Quarter-Kelly
  expected_hold_seconds: 7200  # 2h de tenencia estimada para cost model

# Blacklist por round-trip win rate (Fase 4)
blacklist:
  min_trades: 10       # Mínimo round-trips para evaluar un mercado
  wr_threshold: 0.30   # WR < 30% → blacklist
  blacklist_days: 7    # Días de blacklist tras superar el umbral

# Stage Machine (Fase 2)
stages:
  promote_threshold: 7   # Reviews positivos necesarios en la ventana de 10
  review_window: 10      # Últimos N reviews considerados para auto-promoción

# Anti-frontrunning jitter (TODO 1.5)
anti_frontrun:
  enabled: true
  size_jitter_pct: 0.15
  price_jitter_prob: 0.30
  timing_jitter_sec: 5.0

# Loop principal
main_loop_interval_sec: 10
health_check_interval_sec: 60

# Logging
log_level: INFO
log_file: data/nachomarket.log

# Telegram
telegram_enabled: true
telegram_alert_on_trade: true
telegram_alert_on_error: true
