# NachoMarket - Configuracion general
mode: live
signature_type: 2

# Capital y riesgo
capital_total: 166
max_risk_per_market: 0.25
max_daily_drawdown: 10.0
kelly_fraction: 0.15

# Self-review
review_interval_hours: 8
review_model: claude-haiku-4-5-20251001

# Estrategias activas
strategies_enabled:
  - rewards_farmer

# LP Rewards Farming v2 - Pivot a mercados chicos/nuevos
rewards_farmer:
  max_capital_per_market: 50.0       # Antes 40. Mas capital en mercado dominado = mas rewards (scoring cuadratico)
  min_rewards_pool_usd: 50.0         # Antes 6. Epstein-style pagan $100/dia, esto filtra mas agresivo
  max_markets_simultaneous: 12       # Antes 8. Mas diversificacion sobre mercados chicos
  two_sided: false
  spread_pct_of_max: 0.80
  inventory_merge_threshold: 5
  competition_share_min: 0.02        # Antes 0.01. Trump nos dio 0.01% real, el filtro debe ser mas estricto
  max_mid_deviation: 0.45

# Loop principal
main_loop_interval_sec: 15
health_check_interval_sec: 60

# Logging
log_level: INFO
log_file: data/nachomarket.log

# Telegram
telegram_enabled: true
telegram_alert_on_trade: true
telegram_alert_on_error: true