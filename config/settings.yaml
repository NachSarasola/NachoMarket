# NachoMarket - Configuracion general
mode: live  # paper | live

# Auth Polymarket (convencion oficial py-clob-client-v2)
# signature_type=0 → EOA (MetaMask directo, sin proxy)
# signature_type=1 → POLY_PROXY (Magic Link / email wallets)
# signature_type=2 → POLY_GNOSIS_SAFE (MetaMask + proxy wallet — mas comun)
signature_type: 2

# Capital y riesgo
capital_total: 166           # USDC total disponible
max_risk_per_market: 0.30    # 30% maximo por mercado para farming de rewards ($50)
max_daily_drawdown: 8.3      # 5% de $166 — parar si se pierden $8.3 en un dia
kelly_fraction: 0.25         # Quarter Kelly (conservador)
min_market_volume: 300      # Regla INQUEBRANTABLE: sin rewards → >= $300. Con rewards puede ser menor.
                             # 5K como default práctico: evita basura pero no excluye mercados con rewards.

# Self-review con Claude Haiku
review_interval_hours: 8
review_model: claude-haiku-4-5-20251001

# Estrategias activas
# RF es la estrategia principal. MM desactivado para concentrar capital en farming.
strategies_enabled:
  - rewards_farmer
  # - market_maker   # Desactivado: todo el capital a rewards farming
  # multi_arb, stat_arb, directional desactivados: con $150 los tickets son
  # demasiado chicos para que el arb compense fees. Concentrar en MM + rewards.
  # - event_driven   # Activar cuando se configure FRED API key
  # - directional    # Requiere mas capital

# Near-resolution gate: MM cancela quotes si el mercado resuelve en < N horas
near_resolution_hours: 336   # Tip 2: 14 dias (336h) minimo para operar

# Market Making (secundario a RF — mas conservador)
market_maker:
  spread_offset: 0.012          # Un poco mas ancho que RF
  order_size: 7.0              # Mas chico que RF para no competir por capital
  num_levels: 1                 # Solo mejor nivel: mas capital eficiente
  refresh_seconds: 180        # Menos frecuente — dejar espacio a RF
  max_inventory_per_market: 20 # 12% cap — menos agresivo que RF
  repositioning_enabled: true  # Despues de un fill, reposicionar en entry+1c
  reposition_offset: 0.01      # 1 centavo de offset para reposicionamiento (tip 6)
  reposition_timeout_min: 60   # Cancelar reposicion si no se ejecuta en 90min
  near_resolution_hours: 300   # Tip 2: cancelar quotes si faltan < 14 dias para resolucion

# Arbitraje Multi-Outcome (desactivado)
multi_arb:
  min_edge: 0.03
  max_position: 12  # 7.3% de $166

# Stat-Arb YES/NO Cointegrado (desactivado)
stat_arb:
  edge_threshold: 0.02
  max_position: 12  # 7.3% de $166
  max_markets_simultaneous: 5
  fee_bps: 100

# LP Rewards Farming v2 — Two-sided optimizado
rewards_farmer:
  max_capital_per_market: 33.0        # $33 por mercado (166/5 = $33.2)
  min_rewards_pool_usd: 0.0           # WORKAROUND: API rewards caida. Restaurar a 1.0 cuando endpoint responda.
  max_markets_simultaneous: 5         # 5 mercados max
  two_sided: true                     # BID en YES + BID en NO = 3x Q_min
  spread_pct_of_max: 0.50             # Centro del max_spread (S=0.50, buen compromiso)
  inventory_merge_threshold: 5        # Merge YES+NO cuando ambos >= 5 shares
  competition_share_min: 0.05         # Rotar a otro mercado si share < 5%
  max_mid_deviation: 0.35             # Solo |mid-0.50| <= 0.35 (mid en [0.15, 0.85])

# Event-Driven Momentum (desactivado)
event_driven:
  max_position: 8.3
  momentum_delay_sec: 120
  pre_event_window_sec: 7200

# Directional Strategy (desactivado)
directional:
  min_edge_bps: 100
  min_size_usdc: 5.0
  max_size_usdc: 8.3         # 5% de $166 — regla INQUEBRANTABLE
  kelly_fraction: 0.25       # Quarter-Kelly
  expected_hold_seconds: 7200

# Blacklist por round-trip win rate
blacklist:
  min_trades: 10
  wr_threshold: 0.30
  blacklist_days: 7

# Stage Machine
stages:
  promote_threshold: 7
  review_window: 10

# Anti-frontrunning jitter
anti_frontrun:
  enabled: true
  size_jitter_pct: 0.15
  price_jitter_prob: 0.30
  timing_jitter_sec: 5.0

# Loop principal
main_loop_interval_sec: 30
health_check_interval_sec: 60

# Logging
log_level: INFO
log_file: data/nachomarket.log

# Telegram
telegram_enabled: true
telegram_alert_on_trade: true
telegram_alert_on_error: true
