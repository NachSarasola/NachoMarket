# NachoMarket - Configuracion general
mode: live  # paper | live

# Auth Polymarket (convencion oficial py-clob-client-v2)
# signature_type=0 → EOA (MetaMask directo, sin proxy)
# signature_type=1 → POLY_PROXY (Magic Link / email wallets)
# signature_type=2 → POLY_GNOSIS_SAFE (MetaMask + proxy wallet — mas comun)
signature_type: 2

# Capital y riesgo
capital_total: 166           # USDC total disponible
max_risk_per_market: 0.20    # 20% maximo por mercado = $33 (circuit breaker)
max_daily_drawdown: 8.3      # 5% de $166 — parar si se pierden $8.3 en un dia
kelly_fraction: 0.25         # Quarter Kelly (conservador)
min_market_volume: 500       # Solo mercados con >= $500 volumen diario

# Self-review con Claude Haiku
review_interval_hours: 8
review_model: claude-haiku-4-5-20251001

# Estrategias activas — solo RF
strategies_enabled:
  - rewards_farmer

# Near-resolution gate
near_resolution_hours: 336   # 14 dias (336h) minimo para operar

# LP Rewards Farming v2 — Two-sided optimizado
rewards_farmer:
  max_capital_per_market: 50.0        # $50 por mercado: side_capital=12.5, compra 20 shares a $0.50-$0.68
  min_rewards_pool_usd: 5.0           # Descartar mercados con rewards < $5/dia
  max_markets_simultaneous: 3         # 3 mercados × $40 real = $120 desplegado (72% de $166)
  two_sided: true                     # BID+ASK por token = 3x Q_min vs solo BID
  spread_pct_of_max: 0.50             # Informativo; _qualifying_bid domina la logica
  inventory_merge_threshold: 5        # Merge YES+NO cuando ambos >= 5 shares
  competition_share_min: 0.005        # 0.5% — antes 5% era demasiado alto
  max_mid_deviation: 0.40             # mid en [0.10, 0.90]

# Loop principal
main_loop_interval_sec: 30
health_check_interval_sec: 60

# Logging
log_level: INFO
log_file: data/nachomarket.log

# Telegram
telegram_enabled: true
telegram_alert_on_trade: true
telegram_alert_on_error: true
