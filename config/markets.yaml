# NachoMarket - Mercados target y parametros
min_daily_volume_usd: 10000  # No operar en mercados con menos volumen
max_markets_simultaneous: 5
market_refresh_interval_sec: 300  # Re-escanear mercados cada 5 min

# Filtros de mercado
filters:
  min_liquidity_usd: 5000
  max_spread_pct: 5.0
  min_time_to_resolution_hours: 24  # Evitar mercados que cierran pronto
  excluded_categories: []  # Categorias a excluir

# Preferencias de mercado (ordenadas por prioridad)
preferred_categories:
  - crypto
  - politics
  - sports
  - entertainment

# Tokens a escuchar por WebSocket (se actualiza automaticamente al escanear mercados)
# Formato: token_id (ID del token binario) + condition_id (ID del mercado)
watch_tokens: []
# Ejemplo:
# watch_tokens:
#   - token_id: "71321045679252212594626385532587992013..."
#     condition_id: "0xabc123..."
