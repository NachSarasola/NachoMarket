# NachoMarket v2 - Mercados target y parametros
# Optimizado para rewards farming two-sided
min_daily_volume_usd: 300      # Reducido: mercados chicos con rewards pueden funcionar
small_market_volume_usd: 150   # Override para mercados muy chicos con buen share
max_markets_simultaneous: 12   # Suficiente para RF v2 (10 activos + 2 slot rotacion)
bot_order_size: 6.0            # Por lado en two-sided (6 YES + 6 NO = $12 total)
market_refresh_interval_sec: 300

# Filtros de mercado
filters:
  min_liquidity_usd: 200
  max_spread_pct: 10.0         # Permitir spreads mas anchos (mas room para scorer)
  min_time_to_resolution_hours: 72  # 3 dias minimo (captura al menos medio epoch)
  min_market_age_hours: 4      # Entrar temprano en mercados nuevos (pre-game sports)
  excluded_categories:
    - entertainment
  excluded_keywords:
    - "release"
    - "launch"
    - "opening weekend"
    - "tomorrow"
  mid_price_min: 0.15          # Mas restrictivo: two-sided near 0.50
  mid_price_max: 0.85

# Competition scoring
competition:
  max_book_depth_per_side: 1500
  min_participation_share: 0.02

# Diversificacion por tematica
diversification:
  max_per_category: 4  # Aumentado: sports puede tener muchos juegos simultaneos

# Preferencias de mercado (ordenadas por prioridad — sports primero en Abril 2026)
# Abril 2026: $5M liquidity incentives en sports/esports
# Estrategia $166: Tier 2-3 (menos competencia, mejor share del pool)
# Tier 1 (Champions League, EPL, NBA) tiene MMs con $100K+ → nos aplastan
preferred_categories:
  - sports        # Prioridad 1: MLB, MLS, Liga MX, Bundesliga, Serie A, La Liga, Ligue 1
  - esports       # Prioridad 2: Valorant, Dota 2 ($3.5K/pool, comunidad chica de MMs)
  - politics      # Prioridad 3: estables, feesEnabled=true, holding rewards 4% APY
  - crypto        # Prioridad 4: alto volumen, feesEnabled=true

# Ventanas de tiempo: ajustar tamaño de ordenes segun actividad del mercado
time_windows:
  low_activity_hours: [5, 6, 7, 8, 9, 10, 11, 12]
  high_activity_hours: [14, 15, 16, 17, 18, 19, 20, 21]
  low_activity_size_factor: 0.5
  prime_placement_window_utc: [0, 1, 2, 3]   # 00-04 UTC = minima competencia US/Europa
  prime_size_boost: 1.3                       # +30% en ventana prime

# Tip 21: no cancelar y reposicionar si el mid no se movio suficiente
min_mid_change_to_reposition: 0.02

# Tip 16: reserva — informativa, consumida por circuit breaker
loss_reserve_usdc: 20.0

# Banlist de mercados: evitar duplicados y mercados problematicos
banned_markets:
  condition_ids: []
  question_patterns: []

watch_tokens: []
