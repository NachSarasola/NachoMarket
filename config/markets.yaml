# NachoMarket v2 - Mercados target y parametros
# Pivot estrategico: rewards farming en mercados chicos/nuevos (Epstein-style)
min_daily_volume_usd: 0            # Sin filtro de volumen: permitir mercados nuevos/sin volume
small_market_volume_usd: 0         # Sin filtro: guarded con `if > 0` en _passes_gamma_filters
max_markets_simultaneous: 16       # Pool de candidatos; RF elige los mejores 8
bot_order_size: 6.0                # Placeholder; RF sizea por shares
market_refresh_interval_sec: 300

# Filtros de mercado
filters:
  min_liquidity_usd: 0
  max_spread_pct: 8.0
  min_time_to_resolution_hours: 24    # Antes 168 (7d). Bajamos para captar mercados de resolucion corta tipo Epstein-by-May-8
  min_market_age_hours: 0             # Antes 6. Queremos mercados recien salidos (first mover advantage)
  excluded_categories:
    - entertainment
  excluded_keywords:
    - "release"
    - "launch"
    - "opening weekend"
    - "tomorrow"
  mid_price_min: 0.03                 # Antes 0.05. Algunos mercados chicos tienen YES @ 0.04
  mid_price_max: 0.97                 # Antes 0.95. Para no perder el lado YES de mercados >0.95
  min_reward_density: 0.0             # desactivado: filtro calibrado para LPs grandes

# Competition scoring
competition:
  max_book_depth_per_side: 5000
  min_participation_share: 0.005     # 0.5% — alineado con settings.yaml

# Diversificacion por tematica
diversification:
  max_per_category: 3

# Preferencias de mercado
preferred_categories:
  - sports
  - esports
  - politics
  - crypto

# Ventanas de tiempo
time_windows:
  prime_placement_window_utc: [0, 1, 2, 3, 22, 23]
  prime_size_boost: 1.2
  low_activity_hours: [5, 6, 7, 8, 9, 10, 11, 12]
  low_activity_size_factor: 0.7

# Cancelar y reposicionar solo si mid se mueve >= 1.5c (alineado con REPRICE_THRESHOLD_RATIO=0.5 y max_spread=3c)
min_mid_change_to_reposition: 0.015

# Reserva de perdida
loss_reserve_usdc: 20.0

# Banlist de mercados
banned_markets:
  condition_ids: []
  question_patterns: []

watch_tokens: []
