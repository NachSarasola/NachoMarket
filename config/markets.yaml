# NachoMarket v2 - Mercados target y parametros
# Optimizado para rewards farming two-sided
min_daily_volume_usd: 500
small_market_volume_usd: 200
max_markets_simultaneous: 8        # Pool de candidatos; RF elige los mejores 4
bot_order_size: 6.0                # Placeholder; RF sizea por shares
market_refresh_interval_sec: 300

# Filtros de mercado
filters:
  min_liquidity_usd: 200
  max_spread_pct: 8.0
  min_time_to_resolution_hours: 96   # 4 dias — captura >= 1 epoch completo
  min_market_age_hours: 6
  excluded_categories:
    - entertainment
  excluded_keywords:
    - "release"
    - "launch"
    - "opening weekend"
    - "tomorrow"
  mid_price_min: 0.05
  mid_price_max: 0.95
  min_reward_density: 0.005          # $/dia por $ de profundidad de competencia

# Competition scoring
competition:
  max_book_depth_per_side: 5000
  min_participation_share: 0.005     # 0.5% — alineado con settings.yaml

# Diversificacion por tematica
diversification:
  max_per_category: 3

# Preferencias de mercado
preferred_categories:
  - sports
  - esports
  - politics
  - crypto

# Ventanas de tiempo
time_windows:
  prime_placement_window_utc: [0, 1, 2, 3, 22, 23]
  prime_size_boost: 1.2
  low_activity_hours: [5, 6, 7, 8, 9, 10, 11, 12]
  low_activity_size_factor: 0.7

# Cancelar y reposicionar solo si mid se mueve >= 1.5c (alineado con REPRICE_THRESHOLD_RATIO=0.5 y max_spread=3c)
min_mid_change_to_reposition: 0.015

# Reserva de perdida
loss_reserve_usdc: 20.0

# Banlist de mercados
banned_markets:
  condition_ids: []
  question_patterns: []

watch_tokens: []
